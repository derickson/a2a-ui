services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_BASE_PATH: ${BASE_PATH:-}
    env_file:
      - .env
    environment:
      - ELASTIC_APM_ENVIRONMENT=production
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
